name: "Beta Deployment"

on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  pre_release_ios_build:
    name: "Beta Deployment iOS"
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios
        env:
          BUNDLE_DISABLE_SHARED_GEMS: "true"

      - name: Set up Keychain
        run: |
          # 1. 创建并设置默认
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          # 2. 解锁并设置超时时间
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          # 3. 将其加入用户的搜索列表 (修复 xargs 可能带来的空格路径错误)
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          # 4. 【关键修复】赋予打包工具静默访问权限，防止卡死
          security set-keychain-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Setup SSH Keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Disable SSH Host Key Verification
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Install CocoaPods
        working-directory: ios
        run: |
          gem install bundler -v "$(grep -A 1 "BUNDLED WITH" Gemfile.lock | tail -n 1)" || gem install bundler
          bundle install
          bundle exec pod install

      - name: Build and Upload to TestFlight
        run: bundle exec fastlane beta
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
          # 明确告诉 Fastlane 使用我们刚才创建的钥匙串
          MATCH_KEYCHAIN_NAME: ${{ runner.temp }}/app-signing.keychain-db
          MATCH_KEYCHAIN_PASSWORD: "build"
          CI: true