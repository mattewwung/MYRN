name: "Pre-Release"

on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  pre_release_ios_build:
    name: "Pre-Release iOS Build"
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build iOS app
        run: npm run build:ios